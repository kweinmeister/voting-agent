<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Generate multiple ad copy variants in parallel and let an AI judge pick the best one. Learns your style preferences over time." />
    <title>Voting Agent</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>🗳️ Voting Agent</h1>
        <p class="subtitle">
          Generates multiple ad copy options in parallel and selects the best one.
          Enter a product description to get started.
        </p>
      </header>

      <form id="voting-form" class="run-form">
        <input
          type="text"
          name="prompt"
          id="prompt-input"
          class="form-input"
          placeholder="e.g. A smart coffee mug that keeps your drink hot for hours."
          autocomplete="off"
        />
        <button type="submit" id="submit-btn" class="btn-primary">Run Agent</button>
      </form>

      <div id="error-banner" class="error-banner"></div>

      <div id="results-container">
        <div id="parallel-section">
          <h2 class="section-header">Parallel Generations</h2>
          <div class="voting-results-grid">
            <div class="result-card result-card-humorous">
              <h3>😄 Humorous</h3>
              <div id="result-humorous" class="content"></div>
            </div>
            <div class="result-card result-card-professional">
              <h3>💼 Professional</h3>
              <div id="result-professional" class="content"></div>
            </div>
            <div class="result-card result-card-urgent">
              <h3>⚡ Urgent</h3>
              <div id="result-urgent" class="content"></div>
            </div>
          </div>
        </div>

        <div id="judge-section">
          <h2 class="section-header judge-header">Judge's Decision</h2>
          <div class="result-card result-card-judge">
            <h3>🏆 Winner</h3>
            <div id="result-judge" class="content markdown-body"></div>
          </div>
          <div id="feedback-row" class="feedback-row">
            <span class="feedback-label">Do you agree with the judge?</span>
            <button class="feedback-btn" data-agreed="true">👍 Yes</button>
            <button class="feedback-btn" data-agreed="false">👎 No</button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@18.0.3/lib/marked.umd.js" integrity="sha384-coEhNYf+uY/IAdm3afqLaaHhP4vzpDHARAMbRvTGjDwDSCD7DnG5dAKe4sDoUupt" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.2/dist/purify.min.js" integrity="sha384-AX0sZ/phUL4R6LAFP+mob0mJIWg2c3PX8wPn48ctytOl7XKfRQHbakBt5/QID7uh" crossorigin="anonymous"></script>
    <script src="/static/stream-handler.js"></script>
    <script src="/static/voting.js"></script>
  </body>
</html>
